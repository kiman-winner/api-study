name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Redis 실행
        uses: supercharge/redis-github-action@1.7.0
        with:
          redis-version: 7

      - name: 테스트 실행
        run: ./gradlew test
        env:
          DB_USERNAME: root
          DB_PASSWORD: 1234
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: payment-api-secret-key-must-be-at-least-32-characters
